<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trend Hub Decision Hub</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:20px;background:#f6f8fc;color:#0f172a}
    h1{margin:0 0 8px}
    p{margin-top:0}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
    .card{background:#fff;border:1px solid #dbe2ef;border-radius:12px;padding:12px}
    .item{border-top:1px dashed #e5eaf4;padding:10px 0}
    .item:first-child{border-top:0}
    label{margin-right:8px;font-size:13px}
    .good{color:#166534}.bad{color:#b91c1c}.keep{color:#7c2d12}
    textarea{width:100%;min-height:220px;margin-top:10px;border:1px solid #cfd8ea;border-radius:8px;padding:8px}
    button{padding:9px 12px;border-radius:8px;border:1px solid #0f766e;background:#0f766e;color:#fff;cursor:pointer}
    .row{display:flex;gap:8px;flex-wrap:wrap}
  </style>
</head>
<body>
  <h1>AI Trend Hub 意思決定ハブ</h1>
  <p>各項目を「これはいい / これはダメ / これは検討」で選択し、最終プロンプトを生成できます。</p>

  <div class="grid" id="grid"></div>

  <div style="margin-top:12px" class="row">
    <button onclick="generatePrompt()">選択結果からプロンプト生成</button>
    <button onclick="copyPrompt()">プロンプトをコピー</button>
  </div>
  <textarea id="out" placeholder="ここに生成されたプロンプトが表示されます。"></textarea>

  <script>
    const ideas = [
      {g:"プロダクト",k:"批評は既定で非表示、必要時展開",d:"good"},
      {g:"プロダクト",k:"OGP共有を主役導線にする",d:"good"},
      {g:"プロダクト",k:"日本語特化で初期公開",d:"good"},
      {g:"通知",k:"日次3回通知（07:00/12:00/18:00）を初期搭載",d:"good"},
      {g:"通知",k:"メール通知は実装しない",d:"good"},
      {g:"パーソナライズ",k:"匿名開始 + 任意ログインのハイブリッド",d:"good"},
      {g:"要約",k:"100字標準 + 200/300展開モード",d:"good"},
      {g:"収集",k:"Google Alerts中心 + 補助ソース追加",d:"consider"},
      {g:"収集",k:"ユーザーに検索ワード入力を要求しない",d:"consider"},
      {g:"UI",k:"スマホは情報量を抑え、分析系はPC優先",d:"good"},
      {g:"UI",k:"Topic Group横断を最重要導線にする",d:"consider"},
      {g:"データ",k:"行動ログを初期から収集し日次集計する",d:"good"},
      {g:"データ",k:"通知開封率/共有率/要約モード選好を追う",d:"good"},
      {g:"運用",k:"A/Bテストは公開後に導入",d:"good"}
    ];

    const grid = document.getElementById("grid");
    ideas.forEach((x,i)=>{
      const d = document.createElement("div");
      d.className = "card";
      d.innerHTML = `
        <strong>${x.g}</strong>
        <div class="item">${x.k}</div>
        <label class="good"><input type="radio" name="s${i}" value="good" ${x.d==="good"?"checked":""}> これはいい</label>
        <label class="bad"><input type="radio" name="s${i}" value="bad" ${x.d==="bad"?"checked":""}> これはダメ</label>
        <label class="keep"><input type="radio" name="s${i}" value="consider" ${x.d==="consider"?"checked":""}> これは検討</label>
      `;
      grid.appendChild(d);
    });

    function generatePrompt(){
      const good=[],bad=[],consider=[];
      ideas.forEach((x,i)=>{
        const v = document.querySelector(`input[name="s${i}"]:checked`).value;
        if(v==="good") good.push(`- ${x.g}: ${x.k}`);
        if(v==="bad") bad.push(`- ${x.g}: ${x.k}`);
        if(v==="consider") consider.push(`- ${x.g}: ${x.k}`);
      });
      const txt = [
        "以下はAI Trend Hubの意思決定結果です。docs/spec と docs/imp と docs/mock を更新してください。",
        "",
        "【これはいい（採用）】",
        ...(good.length?good:["- なし"]),
        "",
        "【これはダメ（不採用）】",
        ...(bad.length?bad:["- なし"]),
        "",
        "【これは検討（保留）】",
        ...(consider.length?consider:["- なし"]),
        "",
        "要件: 仕様書・実装タスク・モックを整合させ、変更点サマリも作成してください。"
      ].join("\n");
      document.getElementById("out").value = txt;
    }

    async function copyPrompt(){
      const out = document.getElementById("out");
      if (!out.value) generatePrompt();
      try {
        await navigator.clipboard.writeText(out.value);
      } catch {
        out.select();
        document.execCommand("copy");
      }
    }
  </script>
</body>
</html>
