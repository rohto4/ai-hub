<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trend Hub - Mode D Card Grid Fixed</title>
  <style>
    :root { --bg:#f7f8fb; --ink:#1f2430; --muted:#5d6576; --line:#e3e7f0; --card:#fff; --brand:#e60023; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--ink)}
    .top{position:sticky;top:0;z-index:8;background:rgba(247,248,251,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .top-inner{max-width:1280px;margin:0 auto;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .logo{font-weight:800;font-size:14px}
    .chip{font-size:11px;border:1px solid var(--line);padding:6px 8px;border-radius:999px;background:#fff;color:var(--muted);cursor:pointer}
    .chip.on{background:#111827;color:#fff;border-color:#111827}
    .search{flex:1;min-width:220px;padding:8px 10px;border-radius:999px;border:1px solid var(--line)}
    .wrap{max-width:1280px;margin:0 auto;padding:12px}
    .utility{display:flex;flex-wrap:wrap;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:10px}
    .label{font-size:11px;color:var(--muted)}
    .select,.toggle,.action-btn{font-size:12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#4c566a;padding:7px 9px}
    .toggle{cursor:pointer}
    .toggle.on{background:#111827;color:#fff;border-color:#111827}
    .action-btn{cursor:pointer}
    .density{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff}
    .density input{width:110px}
    .stat{margin-left:auto;font-size:11px;color:#6a7283;border:1px dashed #d8ddea;border-radius:8px;padding:6px 8px;background:#fbfcff}
    .masonry{column-count:4;column-gap:12px}
    .card{break-inside:avoid;display:inline-block;width:100%;margin:0 0 12px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(16,24,40,.06)}
    .thumb{width:100%;height:168px;position:relative;background:linear-gradient(135deg,#dfe9ff,#d8f8f0)}
    .thumb:after{content:"AI THUMB";position:absolute;right:8px;bottom:8px;font-size:10px;color:#567;background:#fff;border:1px solid #d8e5ff;border-radius:999px;padding:3px 6px}
    .body{padding:10px}
    .meta{font-size:11px;color:#73809a;display:flex;justify-content:space-between}
    .title{font-size:14px;font-weight:700;line-height:1.5;margin:6px 0}
    .sum{font-size:12px;line-height:1.7;color:#39465f}
    .critic{display:none;margin-top:8px;padding:7px;border-radius:8px;background:#f7f9ff;border:1px dashed #cfd8f4;color:#46597f;font-size:12px}
    .critic.show{display:block}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .btn{font-size:11px;padding:6px 8px;border:1px solid #dbe3f2;border-radius:999px;background:#fff;color:#596a86;cursor:pointer}
    .btn.share{background:var(--brand);color:#fff;border-color:var(--brand)}
    .btn.saved{background:#eef2ff;border-color:#cad5ff;color:#2f4f9f}
    .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.35)}
    .modal.show{display:flex}
    .sheet{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}
    .input{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px}
    .row{display:flex;gap:8px;margin-top:8px}
    @media (max-width:1100px){.masonry{column-count:3}}
    @media (max-width:760px){.masonry{column-count:2}.top-inner{padding:9px 10px}.stat{margin-left:0}}
    @media (max-width:520px){.masonry{column-count:1}}
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="logo">AI Trend Hub / Mode D Card Grid Fixed</div>
      <input class="search" id="search" placeholder="タイトル検索" />
      <button class="chip on" data-genre="総合">総合</button>
      <button class="chip" data-genre="動画">動画</button>
      <button class="chip" data-genre="公式">公式</button>
      <button class="chip" data-genre="ブログ">ブログ</button>
      <span class="chip on">要約ミックス表示</span>
    </div>
  </header>

  <main class="wrap">
    <section class="utility">
      <span class="label">並び順</span>
      <select class="select" id="sortSelect">
        <option value="rank">ランキング順</option>
        <option value="new">新着順</option>
        <option value="share">共有数順</option>
      </select>

      <span class="label">表示</span>
      <button class="toggle" id="savedOnly">保存のみ</button>
      <button class="toggle on" id="criticToggle">批評ボタン表示</button>
      <button class="action-btn" id="randomPick">ランダム発見</button>
      <button class="action-btn" id="digestSetting">通知設定</button>

      <div class="density">
        <span class="label">密度</span>
        <input id="density" type="range" min="0" max="2" step="1" value="1" />
      </div>

      <div class="stat" id="resultStat">表示: 0 件 / 保存: 0 件</div>
    </section>

    <section class="masonry" id="grid"></section>
  </main>

  <div class="modal" id="modal">
    <div class="sheet">
      <div style="font-weight:700;margin-bottom:8px">OGP共有</div>
      <input class="input" id="shareInput" />
      <div class="row">
        <button class="btn share" id="copyBtn">コピー</button>
        <button class="btn" id="closeBtn">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    let genre = "総合";
    let query = "";
    let savedOnly = false;
    let showCriticBtn = true;
    let density = 1;
    let sort = "rank";

    const saved = new Set();
    const genres = ["動画","公式","ブログ"];
    const items = Array.from({ length: 30 }, (_, i) => ({
      id: i + 1,
      rank: i + 1,
      share: 300 - i * 7,
      created: 30 - i,
      genre: genres[i % 3],
      title: i % 2 ? "低遅延推論エンジン公開で導入加速" : "Agent連携ワークフロー拡張デモ",
      sShort: i % 2 ? "推論単価を下げ導入しやすい。" : "工程自動化の価値が高い。",
      s100: i % 2
        ? "同精度で推論単価を抑え導入しやすい。差分は推論経路最適化。"
        : "工程自動化の価値が高い。差分は外部サービス統合と実運用の再現性。",
      s200: i % 2
        ? "同精度で推論単価を抑え導入しやすい。差分は推論経路最適化で、短期導入につながる。"
        : "Agent連携で複数工程を自動化。既存RPAとの差分は文脈保持と失敗時リカバリ。運用設計が鍵。",
      s300: i % 2
        ? "同精度で推論単価を抑えつつ精度低下を最小化。差分は推論経路最適化とキャッシュ戦略。短期導入に届くが、初期データ整備は必要。"
        : "Agent連携ワークフローで複数工程を自動化。既存RPAとの差分は文脈保持と分岐処理。実務向けだが、導入前に権限設計とログ設計を先に決める必要がある。",
      critic: i % 2 ? "既存最適化との差分が明確。" : "失敗時の復旧条件が未提示。"
    }));

    const mix = ["short","100","200","300"];
    items.forEach((item, idx) => { item.lenType = mix[idx % mix.length]; });

    const grid = document.getElementById("grid");
    const resultStat = document.getElementById("resultStat");
    const modal = document.getElementById("modal");
    const shareInput = document.getElementById("shareInput");

    function getFiltered() {
      let rows = items.filter(x =>
        (genre === "総合" || x.genre === genre) &&
        x.title.includes(query) &&
        (!savedOnly || saved.has(x.id))
      );
      rows = rows.sort((a, b) => {
        if (sort === "rank") return a.rank - b.rank;
        if (sort === "new") return b.created - a.created;
        return b.share - a.share;
      });
      return rows;
    }

    function summaryOf(x){
      if (x.lenType === "short") return x.sShort;
      if (x.lenType === "100") return x.s100;
      if (x.lenType === "200") return x.s200;
      return x.s300;
    }

    function render() {
      const rows = getFiltered();
      const sizeMap = [11, 12, 13];
      const titleMap = [13, 14, 15];
      const summarySize = sizeMap[density];
      const titleSize = titleMap[density];

      grid.innerHTML = rows.map((x, idx) => `
        <article class="card">
          <div class="thumb"></div>
          <div class="body">
            <div class="meta"><span>#${idx + 1} ${x.genre}</span><span>${x.lenType === "short" ? "<100" : x.lenType}字</span></div>
            <div class="title" style="font-size:${titleSize}px">${x.title}</div>
            <div class="sum" style="font-size:${summarySize}px">${summaryOf(x)}</div>
            <div class="critic">${x.critic}</div>
            <div class="actions">
              <button class="btn">詳細</button>
              <button class="btn">TopicGroup</button>
              <button class="btn share share-btn" data-title="${x.title}">共有</button>
              <button class="btn save-btn ${saved.has(x.id) ? "saved" : ""}" data-id="${x.id}">${saved.has(x.id) ? "保存済み" : "保存"}</button>
              ${showCriticBtn ? `<button class="btn critic-btn">批評</button>` : ""}
            </div>
          </div>
        </article>
      `).join("");

      document.querySelectorAll(".save-btn").forEach(b => {
        b.onclick = e => {
          const id = Number(e.target.dataset.id);
          if (saved.has(id)) saved.delete(id); else saved.add(id);
          render();
        };
      });
      document.querySelectorAll(".critic-btn").forEach(b => {
        b.onclick = e => {
          const c = e.target.closest(".body").querySelector(".critic");
          c.classList.toggle("show");
        };
      });
      document.querySelectorAll(".share-btn").forEach(b => {
        b.onclick = e => {
          shareInput.value = `AI Trend Hub: ${e.target.dataset.title} https://aitrendhub.example/article`;
          modal.classList.add("show");
        };
      });

      resultStat.textContent = `表示: ${rows.length} 件 / 保存: ${saved.size} 件`;
    }

    document.querySelectorAll("[data-genre]").forEach(btn => {
      btn.onclick = () => {
        genre = btn.dataset.genre;
        document.querySelectorAll("[data-genre]").forEach(x => x.classList.remove("on"));
        btn.classList.add("on");
        render();
      };
    });

    document.getElementById("search").addEventListener("input", e => { query = e.target.value.trim(); render(); });
    document.getElementById("sortSelect").addEventListener("change", e => { sort = e.target.value; render(); });
    document.getElementById("savedOnly").onclick = e => { savedOnly = !savedOnly; e.target.classList.toggle("on", savedOnly); render(); };
    document.getElementById("criticToggle").onclick = e => { showCriticBtn = !showCriticBtn; e.target.classList.toggle("on", showCriticBtn); render(); };
    document.getElementById("density").addEventListener("input", e => { density = Number(e.target.value); render(); });
    document.getElementById("randomPick").onclick = () => {
      const rows = getFiltered();
      if (!rows.length) return;
      const pick = rows[Math.floor(Math.random() * rows.length)];
      shareInput.value = `おすすめ: ${pick.title} https://aitrendhub.example/article`;
      modal.classList.add("show");
    };
    document.getElementById("digestSetting").onclick = () => { alert("通知設定: 07:00 / 12:00 / 18:00"); };
    document.getElementById("closeBtn").onclick = () => modal.classList.remove("show");
    document.getElementById("copyBtn").onclick = async () => {
      try { await navigator.clipboard.writeText(shareInput.value); alert("コピーしました"); }
      catch { alert("コピーに失敗しました"); }
    };
    modal.onclick = e => { if (e.target === modal) modal.classList.remove("show"); };
    render();
  </script>
</body>
</html>
