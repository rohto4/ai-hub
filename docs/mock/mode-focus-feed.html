<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trend Hub - Mode B Focus Feed</title>
  <style>
    :root{--ink:#0a2540;--muted:#4a637d;--line:#e3eaf6;--card:#fff}
    *{box-sizing:border-box}
    body{
      margin:0;font-family:system-ui,sans-serif;color:var(--ink);
      background:radial-gradient(90% 50% at 0% 0%,#dde9ff 0%,transparent 70%),radial-gradient(90% 55% at 100% 0%,#dafbf2 0%,transparent 70%),linear-gradient(180deg,#f8fbff,#fff 52%);
    }
    .top{position:sticky;top:0;z-index:8;background:rgba(248,251,255,.9);backdrop-filter:blur(8px);border-bottom:1px solid #e6edf8}
    .top-inner{max-width:1260px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px}
    .logo{font-size:14px;font-weight:800}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-size:11px;padding:6px 8px;border:1px solid #d8e3f6;border-radius:999px;color:#5c7490;background:#fff}
    .shell{max-width:1260px;margin:0 auto;padding:16px}
    .layout{display:grid;grid-template-columns:1.3fr .7fr;gap:12px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center}
    .tabs,.modes{display:flex;gap:6px;flex-wrap:wrap}
    .tab,.mode{font-size:11px;padding:6px 8px;border:1px solid #dce6f8;border-radius:999px;background:#fff;color:#617892;cursor:pointer}
    .tab.on,.mode.on{background:#edf4ff;color:#1d4f93;border-color:#cadcf9}
    .search{font-size:12px;padding:7px 9px;border:1px solid #dce6f8;border-radius:9px;min-width:200px}
    .story{margin-top:8px;border:1px solid #e3eaf6;border-radius:12px;padding:10px;display:grid;grid-template-columns:190px 1fr;gap:10px}
    .thumb{height:128px;border:1px solid #d7e5ff;border-radius:10px;background:linear-gradient(140deg,#ecf3ff,#f6fffc);position:relative}
    .thumb:after{content:"AI GENERATED";position:absolute;right:7px;bottom:6px;font-size:10px;color:#3c5f85;background:#f3f8ff;border:1px solid #d4e3fb;border-radius:999px;padding:2px 6px}
    .meta{font-size:11px;color:#6f85a1;display:flex;justify-content:space-between}
    .title{font-size:16px;font-weight:700;margin:6px 0}
    .sum{font-size:13px;line-height:1.75;color:#2b4c69}
    .sum[data-mode]{display:none}
    .critic{display:none;margin-top:8px;padding:7px;border-radius:8px;background:#f4f8ff;border:1px dashed #cfddf5;font-size:12px;color:#375473}
    .critic.show{display:block}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .btn{font-size:11px;padding:6px 8px;border:1px solid #d8e3f6;border-radius:999px;background:#fff;color:#516984;cursor:pointer}
    .btn.share{background:#0a2540;border-color:#0a2540;color:#fff}
    .btn.saved{background:#eaf2ff;border-color:#b8d0ff;color:#1f4e96}
    .kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .box{padding:8px;border:1px solid #e2e9f6;border-radius:10px;background:#fbfdff}
    .k{font-size:10px;color:#7188a1}.v{font-size:20px;font-weight:800}
    .note{margin-top:8px;font-size:12px;color:#59728e}
    .section{margin-top:12px}
    .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .topic{padding:8px;border:1px solid #e1e8f5;border-radius:9px;background:#fff;font-size:12px;color:#4f6987;cursor:pointer}
    .topic.active{border-color:#b8d2ff;background:#edf4ff;color:#1f4d92}
    .modal{position:fixed;inset:0;background:rgba(7,18,41,.36);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
    .modal.show{display:flex}
    .sheet{width:min(520px,100%);background:#fff;border:1px solid #d8e3f5;border-radius:12px;padding:12px}
    .input{width:100%;padding:9px;border:1px solid #d8e3f5;border-radius:8px}
    @media (max-width:980px){.layout{grid-template-columns:1fr}}
    @media (max-width:760px){.story{grid-template-columns:1fr}.chips{display:none}.shell{padding:12px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <div class="logo">AI Trend Hub / Mode B Focus Feed</div>
      <div class="chips">
        <div class="chip">日本語</div><div class="chip">通知 07:00 / 12:00 / 18:00</div><div class="chip">サムネ自動生成</div>
      </div>
    </div>
  </header>

  <div class="shell">
    <section class="layout">
      <main class="panel">
        <div class="toolbar">
          <div class="tabs" id="genreTabs"></div>
          <input class="search" id="searchInput" placeholder="タイトルで絞り込み" />
          <div class="modes" id="summaryModes"></div>
        </div>
        <div id="list"></div>
      </main>
      <aside class="panel">
        <div class="kpi">
          <div class="box"><div class="k">External</div><div class="v">61.2</div></div>
          <div class="box"><div class="k">Site</div><div class="v">44.9</div></div>
          <div class="box"><div class="k">Decay</div><div class="v">-13.8</div></div>
          <div class="box"><div class="k">Total</div><div class="v">92.4</div></div>
        </div>
        <div class="note">直近1時間 +28 シェア / 次回通知 12:00</div>
        <div class="section">
          <h3 style="margin:0 0 8px;font-size:14px">Topic Group</h3>
          <div class="topic-grid" id="topicGrid"></div>
        </div>
      </aside>
    </section>
  </div>

  <div class="modal" id="shareModal">
    <div class="sheet">
      <h4 style="margin:0 0 8px">OGP共有</h4>
      <input class="input" id="shareText" />
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn share" id="copyBtn">コピー</button>
        <button class="btn" id="closeBtn">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const genres = ["総合","動画","公式","ブログ"];
    const modes = ["100","200","300"];
    let currentGenre = "総合", currentMode = "100", query = "";
    const items = Array.from({length:18},(_,i)=>({
      genre:["動画","公式","ブログ"][i%3],
      title:i%2===0?"低遅延推論エンジンで導入障壁が低下":"エージェント連携ワークフロー拡張",
      score:(92.4-i*1.7).toFixed(1),
      s100:i%2===0?"同精度で推論単価を下げ導入しやすい。差分は推論経路最適化。運用担当向け。":"工程自動化の価値は高いが比較条件不足。PoCで再現性評価が必要。",
      s200:i%2===0?"同精度を維持しつつ推論単価を抑え、応答速度を改善。差分は推論経路の再設計。":"複数工程を連携実行し検証作業を削減。価値は高いが比較条件不足で評価に注意。",
      s300:i%2===0?"同精度帯で推論単価を抑えつつ応答速度を改善。差分は推論経路とキャッシュ制御。公開比較条件は限定的で、導入前に自社データで再検証が必要。":"連携ワークフローで複数作業を自動化し、検証工程まで統合。公開デモは成功ケース中心で、失敗条件や運用ガードレール情報が不足。PoCで停止条件設計を先行したい。",
      critic:i%2===0?"比較条件の幅が狭い。導入前の再現検証を推奨。":"失敗ケースの記述が不足。運用設計込みで評価したい。"
    }));

    const genreTabs=document.getElementById("genreTabs"), summaryModes=document.getElementById("summaryModes"), list=document.getElementById("list");
    const topicGrid=document.getElementById("topicGrid"), searchInput=document.getElementById("searchInput");
    const shareModal=document.getElementById("shareModal"), shareText=document.getElementById("shareText");

    function renderTabs(){
      genreTabs.innerHTML=genres.map(g=>`<button class="tab ${g===currentGenre?'on':''}" data-genre="${g}">${g}</button>`).join("");
      summaryModes.innerHTML=modes.map(m=>`<button class="mode ${m===currentMode?'on':''}" data-mode="${m}">${m}字</button>`).join("");
    }
    function renderTopics(){
      const tags=["推論最適化","Agent連携","動画要約","安全性","マルチモーダル","RAG"];
      topicGrid.innerHTML=tags.map((t,i)=>`<button class="topic ${i===0?'active':''}">${t}</button>`).join("");
      topicGrid.querySelectorAll(".topic").forEach(btn=>btn.onclick=()=>{topicGrid.querySelectorAll(".topic").forEach(x=>x.classList.remove("active"));btn.classList.add("active");});
    }
    function filtered(){return items.filter(it=>(currentGenre==="総合"||it.genre===currentGenre)&&it.title.includes(query));}
    function renderList(){
      list.innerHTML=filtered().map((it,idx)=>`
        <article class="story">
          <div class="thumb"></div>
          <div>
            <div class="meta"><span>#${idx+1} ${it.genre}</span><span>Score ${it.score}</span></div>
            <div class="title">${it.title}</div>
            <div class="sum" data-mode="100">${it.s100}</div>
            <div class="sum" data-mode="200">${it.s200}</div>
            <div class="sum" data-mode="300">${it.s300}</div>
            <div class="critic">${it.critic}</div>
            <div class="actions">
              <button class="btn">動画で見る</button><button class="btn">公式で読む</button>
              <button class="btn share share-btn" data-title="${it.title}">OGP共有</button>
              <button class="btn save-btn">保存</button><button class="btn critic-btn">批評を表示</button>
            </div>
          </div>
        </article>`).join("");
      document.querySelectorAll('.sum').forEach(el=>el.style.display=el.dataset.mode===currentMode?"block":"none");
      document.querySelectorAll('.critic-btn').forEach(btn=>btn.onclick=e=>{const c=e.target.closest('.story').querySelector('.critic');c.classList.toggle('show');e.target.textContent=c.classList.contains('show')?'批評を隠す':'批評を表示';});
      document.querySelectorAll('.save-btn').forEach(btn=>btn.onclick=e=>{e.target.classList.toggle('saved');e.target.textContent=e.target.classList.contains('saved')?'保存済み':'保存';});
      document.querySelectorAll('.share-btn').forEach(btn=>btn.onclick=()=>{shareText.value=`AI Trend Hub: ${btn.dataset.title} https://aitrendhub.example/article`;shareModal.classList.add('show');});
    }
    document.addEventListener("click",e=>{if(e.target.matches("[data-genre]")){currentGenre=e.target.dataset.genre;renderTabs();renderList();}if(e.target.matches("[data-mode]")){currentMode=e.target.dataset.mode;renderTabs();renderList();}});
    searchInput.addEventListener("input",e=>{query=e.target.value.trim();renderList();});
    document.getElementById("closeBtn").onclick=()=>shareModal.classList.remove("show");
    document.getElementById("copyBtn").onclick=async()=>{try{await navigator.clipboard.writeText(shareText.value);alert("コピーしました");}catch{alert("コピーに失敗しました");}};
    shareModal.onclick=e=>{if(e.target===shareModal)shareModal.classList.remove("show");};
    renderTabs();renderTopics();renderList();
  </script>
</body>
</html>
