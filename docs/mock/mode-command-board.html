<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trend Hub - Mode A Command Board</title>
  <style>
    :root{--bg:#0e1117;--side:#0c1016;--panel:#131a26;--line:#243145;--ink:#e9effa;--muted:#9caecc}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
    .app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}
    .left{background:var(--side);border-right:1px solid #1b2637;padding:12px}
    .logo{font-weight:700;font-size:14px;padding:8px 10px;border:1px solid #1f2a3a;border-radius:8px;background:#0e1522}
    .label{font-size:11px;color:#7f90b0;margin:12px 0 6px 2px;letter-spacing:.5px;text-transform:uppercase}
    .item{font-size:13px;padding:8px 10px;border-radius:8px;color:#b6c5e4;border:1px solid transparent;cursor:pointer}
    .item.active{background:#15223a;border-color:#2f4673;color:#dce8ff}
    .main{padding:12px}
    .top{position:sticky;top:0;z-index:7;background:rgba(14,17,23,.88);backdrop-filter:blur(8px);padding-bottom:8px}
    .top-inner{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .search{flex:1;max-width:560px;min-width:220px;background:#111827;border:1px solid #26324b;color:#a9bbde;padding:9px 10px;border-radius:9px}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{font-size:11px;color:#a8bbdd;border:1px solid #2a3a5a;padding:6px 8px;border-radius:999px;background:#101a2d;cursor:pointer}
    .chip.on{background:#1b2c4f;color:#cde0ff;border-color:#3e5f9d}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:10px;margin-top:8px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
    .tabs{display:flex;gap:6px;flex-wrap:wrap}
    .tab{font-size:11px;padding:6px 8px;border-radius:999px;border:1px solid #314162;color:#9cb0d6;cursor:pointer}
    .tab.on{background:#1b2a48;color:#cfe0ff}
    .story{margin-top:8px;border:1px solid #2a3750;border-radius:10px;padding:9px;background:#101725}
    .meta{font-size:11px;color:#90a4c8;display:flex;justify-content:space-between}
    .title{font-size:14px;font-weight:600;margin:6px 0}
    .sum{font-size:12px;line-height:1.7;color:#d5dff2}
    .sum[data-mode]{display:none}
    .critic{display:none;margin-top:8px;padding:8px;border-radius:8px;background:#0f203c;border:1px dashed #37507d;color:#b9cbe8;font-size:12px}
    .critic.show{display:block}
    .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
    .btn{font-size:11px;padding:5px 8px;border:1px solid #344569;border-radius:7px;color:#9fb2d6;background:#111d33;cursor:pointer}
    .btn.share{background:linear-gradient(120deg,#4f7fff,#3b82f6);color:#fff;border:0}
    .btn.saved{background:#1f3359;color:#d6e5ff;border-color:#4a689f}
    .kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .box{border:1px solid #2b3753;border-radius:8px;padding:8px;background:#0f1625}
    .k{font-size:10px;color:#8ea2c7}.v{font-size:18px;font-weight:700}
    .log{margin-top:10px;font-size:11px;color:#a7b8d8;border:1px dashed #334866;border-radius:8px;padding:8px;max-height:220px;overflow:auto;background:#0f1623}
    .modal{position:fixed;inset:0;background:rgba(6,11,19,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
    .modal.show{display:flex}
    .sheet{width:min(560px,100%);background:#101a2b;border:1px solid #2f4263;border-radius:10px;padding:12px}
    .input{width:100%;padding:9px;border:1px solid #30456c;border-radius:8px;background:#0f1728;color:#b2c5e6}
    @media (max-width:980px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="logo">AI Trend Hub / Mode A Command Board</div>
      <div class="label">Browse</div>
      <div class="item active">Inbox</div><div class="item">Top Trends</div><div class="item">Topic Groups</div><div class="item">Share Studio</div>
      <div class="label">Admin</div>
      <div class="item">Cluster Review</div><div class="item">Digest Jobs</div><div class="item">Keyword Sets</div>
    </aside>
    <main class="main">
      <div class="top">
        <div class="top-inner">
          <input class="search" id="search" placeholder="検索またはコマンド..." />
          <div class="chips" id="modeChips"></div>
        </div>
      </div>
      <div class="grid">
        <section class="panel">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
            <strong>Live Feed</strong>
            <div class="tabs" id="genreTabs"></div>
          </div>
          <div id="feed"></div>
        </section>
        <aside class="panel">
          <strong>Metrics</strong>
          <div class="kpi">
            <div class="box"><div class="k">External</div><div class="v">61.2</div></div>
            <div class="box"><div class="k">Site</div><div class="v">44.9</div></div>
            <div class="box"><div class="k">Decay</div><div class="v">-13.8</div></div>
            <div class="box"><div class="k">Total</div><div class="v" style="color:#86abff">92.4</div></div>
          </div>
          <div class="log" id="log"></div>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div style="font-weight:600;margin-bottom:7px">OGP共有</div>
      <input class="input" id="shareInput" />
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn share" id="copy">コピー</button>
        <button class="btn" id="close">閉じる</button>
      </div>
    </div>
  </div>

  <script>
    const genres=["総合","動画","公式","ブログ"], modes=["100","200","300"];
    let currentGenre="総合", currentMode="100", query="";
    const data=Array.from({length:24},(_,i)=>({
      genre:["動画","公式","ブログ"][i%3],
      title:i%2?"低遅延推論エンジンで導入障壁を低減":"エージェント連携デモで工程自動化を拡張",
      score:(93-i*1.4).toFixed(1),
      s100:i%2?"同精度で推論単価を抑え導入しやすい。運用担当向け。":"連携自動化の価値は高いが比較条件不足。PoC向け。",
      s200:i%2?"同精度帯で推論単価を抑え、応答遅延を改善。差分は推論経路再設計。":"検証工程を連携し実務価値を強化。失敗条件の説明は不足。",
      s300:i%2?"推論経路とキャッシュ戦略を見直し、同精度で費用効率を改善。公開比較条件は限定的で、導入前に再現検証が必要。":"複数作業と検証工程を統合し効率改善。公開デモは成功例中心で、ガードレール設計と再現性検証を先に行うべき。",
      critic:i%2?"比較条件の幅が狭い。再現検証を推奨。":"失敗ケースの記述が不足。運用要件を先に定義したい。"
    }));
    const feed=document.getElementById("feed"), log=document.getElementById("log");
    function addLog(msg){const t=new Date().toLocaleTimeString("ja-JP",{hour12:false});log.innerHTML=`<div>[${t}] ${msg}</div>`+log.innerHTML;}
    function renderControls(){
      document.getElementById("genreTabs").innerHTML=genres.map(g=>`<button class="tab ${g===currentGenre?'on':''}" data-g="${g}">${g}</button>`).join("");
      document.getElementById("modeChips").innerHTML=modes.map(m=>`<button class="chip ${m===currentMode?'on':''}" data-m="${m}">${m}字</button>`).join("")+`<button class="chip" id="digestBtn">通知設定</button>`;
      document.getElementById("digestBtn").onclick=()=>addLog("通知設定を開きました（07:00 / 12:00 / 18:00）");
    }
    function filtered(){return data.filter(d=>(currentGenre==="総合"||d.genre===currentGenre)&&d.title.includes(query));}
    function renderFeed(){
      feed.innerHTML=filtered().map((d,idx)=>`<article class="story"><div class="meta"><span>#${idx+1} ${d.genre}</span><span>Score ${d.score}</span></div><div class="title">${d.title}</div><div class="sum" data-mode="100">${d.s100}</div><div class="sum" data-mode="200">${d.s200}</div><div class="sum" data-mode="300">${d.s300}</div><div class="critic">${d.critic}</div><div class="actions"><button class="btn">動画</button><button class="btn">公式</button><button class="btn share share-btn" data-title="${d.title}">OGP共有</button><button class="btn save-btn">保存</button><button class="btn critic-btn">批評表示</button></div></article>`).join("");
      document.querySelectorAll('.sum').forEach(el=>el.style.display=el.dataset.mode===currentMode?"block":"none");
      document.querySelectorAll('.critic-btn').forEach(btn=>btn.onclick=e=>{const c=e.target.closest('.story').querySelector('.critic');c.classList.toggle('show');e.target.textContent=c.classList.contains('show')?'批評非表示':'批評表示';addLog("批評表示を切替");});
      document.querySelectorAll('.save-btn').forEach(btn=>btn.onclick=e=>{e.target.classList.toggle('saved');e.target.textContent=e.target.classList.contains('saved')?'保存済み':'保存';addLog("保存状態を変更");});
      document.querySelectorAll('.share-btn').forEach(btn=>btn.onclick=()=>{document.getElementById("shareInput").value=`AI Trend Hub: ${btn.dataset.title} https://aitrendhub.example/article`;document.getElementById("modal").classList.add('show');addLog("共有モーダルを開きました");});
    }
    document.addEventListener("click",e=>{if(e.target.matches("[data-g]")){currentGenre=e.target.dataset.g;renderControls();renderFeed();addLog(`ジャンルを ${currentGenre} に変更`);}if(e.target.matches("[data-m]")){currentMode=e.target.dataset.m;renderControls();renderFeed();addLog(`要約モードを ${currentMode} に変更`);}});
    document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim();renderFeed();});
    document.getElementById("copy").onclick=async()=>{try{await navigator.clipboard.writeText(document.getElementById("shareInput").value);addLog("共有文面をコピー");}catch{addLog("コピー失敗");}};
    document.getElementById("close").onclick=()=>document.getElementById("modal").classList.remove('show');
    document.getElementById("modal").onclick=e=>{if(e.target.id==="modal")e.target.classList.remove('show');};
    renderControls();renderFeed();addLog("ページを読み込みました");
  </script>
</body>
</html>
