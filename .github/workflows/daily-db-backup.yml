name: daily-db-backup

on:
  workflow_dispatch:
  schedule:
    - cron: "15 18 * * *"

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run Neon backup
        run: node scripts/backup-neon-all.mjs --output-dir backups/daily

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-db-backup-${{ github.run_id }}
          path: backups/daily/
          if-no-files-found: error
          retention-days: 7
