name: hourly-fetch

on:
  workflow_dispatch:

jobs:
  hourly-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Layer 1 fetch job
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/hourly-fetch?limit=20"
