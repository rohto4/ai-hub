name: hourly-layer12

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  hourly-layer12:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fetch -> enrich orchestration
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/hourly-layer12?fetchLimit=5&enrichBatchSize=5&maxEnrichBatches=1&summaryBatchSize=5"
