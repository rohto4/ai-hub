name: hourly-publish

on:
  schedule:
    - cron: '50 * * * *'  # 毎時 :50 実行（fetch 00 / enrich 05,10,15,20,25,30,35,40 の後）
  workflow_dispatch:

jobs:
  hourly-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Layer 4 publish job
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/hourly-publish"
      - name: Refresh public rankings after publish
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/hourly-compute-ranks"
