name: monthly-public-archive

on:
  schedule:
    - cron: '0 3 1 * *'   # 毎月 1 日 03:00 UTC
  workflow_dispatch:

jobs:
  monthly-public-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Run monthly public archive job
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/monthly-public-archive"
