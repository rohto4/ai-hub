name: hourly-enrich

on:
  workflow_dispatch:

jobs:
  hourly-enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Layer 2 enrich worker
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/enrich-worker?limit=20&summaryBatchSize=20&maxSummaryBatches=1"
