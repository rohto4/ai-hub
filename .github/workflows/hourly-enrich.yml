name: hourly-enrich

on:
  schedule:
    - cron: '12 * * * *'
    - cron: '27 * * * *'
    - cron: '42 * * * *'
    - cron: '57 * * * *'
  workflow_dispatch:

jobs:
  hourly-enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Layer 2 enrich worker
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${APP_URL}/api/cron/daily-enrich?limit=10&summaryBatchSize=10&maxSummaryBatches=1"
